          completionState: 'Idle',
          finishReasonRaw: actualFinishReason || cleanSingleLine(json?.choices?.[0]?.finish_reason || ''),
          sawReadyMarker,
          sawFinishReason
        });
        assistantState.completionReason = completion.reason;
        assistantState.streamEndedBy = completion.endBy;
        assistantState.finishReasonRaw = completion.finishReasonRaw || '';
        assistantState.completionAt = formatCompletionTime(completion.timestamp);
        assistantState.completionTimestamp = completion.timestamp || 0;
        assistantState.timestampFull = formatTimestampFull(completion.timestamp);
        assistantState.completionDurationMs = completion.durationMs || 0;
        assistantState.thinkDurationMs = completion.thinkDurationMs || 0;
        assistantState.genDurationMs = completion.genDurationMs || 0;
        assistantState.completionState = completion.completionState || 'Idle';
        assistantState.showRegenerate = true;
        updateStreamView();
        chat.messages.push({
          role: 'assistant',
          content: cleanAssistantContent(accumulated),
          thinking: accumulatedThinking,
          thinkingOpen: false,
          thinkingLabel: 'Thinking',
          hasThinking: !!accumulatedThinking,
          completionReason: completion.reason,
          streamEndedBy: completion.endBy,
          finishReasonRaw: completion.finishReasonRaw || '',
          completionAt: formatCompletionTime(completion.timestamp),
          completionTimestamp: completion.timestamp || 0,
          timestampFull: formatTimestampFull(completion.timestamp),
          completionModel: model,
          completionDurationMs: completion.durationMs || 0,
          thinkDurationMs: completion.thinkDurationMs || 0,
          genDurationMs: completion.genDurationMs || 0,
          completionState: completion.completionState || 'Idle',
          activityThinkingOpen: false,
          showRegenerate: true
        });
        setStatus(`Ready (${completion.reason})`, 'idle');
        return;
      }

      while (true) {
        let value, done;
        try {
          ({ value, done } = await streamReader.read());
        } catch (readError) {
          if (streamClosedByWatchdog || readError?.name === 'AbortError') break;
          throw readError;
        }
        if (done) break;
        sawChunk = true;
        chunkCount += 1;
        lastActivityAt = Date.now();
        armWatchdog();
        setStatus('Live', 'busy');

        const chunkText = decoder.decode(value, { stream: true });
        buffer += chunkText;

        if (buffer.includes('\n\n') || buffer.includes('\r\n\r\n')) {
          const parsed = processSSEBuffer(buffer, event => {
            const piece = event?.fallback || '';
            if (event?.reasoning) {
              if (!firstThinkingAt) firstThinkingAt = Date.now();
              accumulatedThinking += event.reasoning;
            }
            if (event?.content) {
              if (!firstContentAt) firstContentAt = Date.now();
              accumulated += event.content;
            }
            if (piece && !event?.content && !event?.reasoning) {
              if (!accumulated && /^thinking(?:\s+process)?\s*:/i.test(piece.trim())) accumulatedThinking += piece;
              else accumulated += piece;
            }
            if (event?.finishReason) {
              sawFinishReason = true;
              actualFinishReason = cleanSingleLine(event.finishReason);
            }
            updateStreamView();
          });
          buffer = parsed.remainder;
          sawReadyMarker = sawReadyMarker || parsed.sawReady;
          sawFinishReason = sawFinishReason || parsed.sawFinish;
          if (sawReadyMarker || sawFinishReason) {
            try { await streamReader.cancel(); } catch {}
            break;
          }
        }
      }

      clearWatchdog();
      buffer += decoder.decode();
      if (buffer.trim()) {
        try {
          const json = JSON.parse(buffer.trim());
          const finalThinking = flattenContent(json?.choices?.[0]?.message?.reasoning_content)
            || flattenContent(json?.choices?.[0]?.message?.reasoning)
            || '';
          const finalContent = extractResponseText(json) || extractStreamDelta(json);
          if (finalThinking && !firstThinkingAt) firstThinkingAt = Date.now();
          if (finalContent && !firstContentAt) firstContentAt = Date.now();
          accumulatedThinking += finalThinking;
          accumulated += finalContent;
        } catch {
          const beforeContent = accumulated;
          const beforeThinking = accumulatedThinking;
          const parsed = processSSEBuffer(buffer + '\n\n', event => {
            const piece = event?.fallback || '';
            if (event?.reasoning) {
              if (!firstThinkingAt) firstThinkingAt = Date.now();
              accumulatedThinking += event.reasoning;
            }
            if (event?.content) {
              if (!firstContentAt) firstContentAt = Date.now();
              accumulated += event.content;
            }
            if (piece && !event?.content && !event?.reasoning) {
              if (!accumulated && /^thinking(?:\s+process)?\s*:/i.test(piece.trim())) accumulatedThinking += piece;
              else accumulated += piece;
            }
          });
          buffer = parsed.remainder;
          if ((accumulated === beforeContent) && (accumulatedThinking === beforeThinking)) {
            const raw = buffer.trim()
              .replace(/^data:\s*/gm, '')
              .replace(/^event:\s*/gm, '')
              .replace(/\[DONE\]/g, '')
              .trim();
            if (raw) {
              if (!accumulated && /^thinking(?:\s+process)?\s*:/i.test(raw)) accumulatedThinking += raw;
              else accumulated += raw;
            }
          }
        }
      }

      if (!accumulated && !accumulatedThinking && sawChunk) {
        throw new Error('Stream ended with no visible output.');
      }

      if (streamClosedByWatchdog) {
        const idleForMs = Date.now() - lastActivityAt;
        const ranForMs = Date.now() - streamStartedAt;
        const hasOutput = !!(accumulated || accumulatedThinking);
        if (!hasOutput) {
          throw new Error(`Stream stalled after ${Math.max(1, Math.round(ranForMs / 1000))}s with no usable output.`);
        }
      }

      const normalizedFinal = normalizeAssistantStreamOutput(accumulated, accumulatedThinking);
      accumulated = normalizedFinal.content;
      accumulatedThinking = normalizedFinal.thinking;

      let completionReason = '';
      let streamEndedBy = '';
      if (sawReadyMarker) {
        completionReason = 'done-marker';
        streamEndedBy = '[DONE]';
      } else if (sawFinishReason) {
        completionReason = 'finish-reason';
        streamEndedBy = 'finish_reason';
      } else if (streamClosedByWatchdog) {
        completionReason = 'watchdog-close';
        streamEndedBy = 'idle-timeout';
      } else {
        completionReason = 'reader-closed';
        streamEndedBy = 'reader.done';
      }

      const timing = computeTimingBreakdown(streamStartedAt, firstThinkingAt, firstContentAt, Date.now());
      const completion = captureStreamCompletion(completionReason, streamEndedBy, {
        chunks: chunkCount,
        contentChars: accumulated.length,
        thinkingChars: accumulatedThinking.length,
        durationMs: timing.totalMs,
        thinkDurationMs: timing.thinkMs,
        genDurationMs: timing.genMs,
        completionState: streamClosedByWatchdog ? 'Error' : 'Idle',
        finishReasonRaw: actualFinishReason,
        sawReadyMarker,
        sawFinishReason
      });

      assistantState.thinkingLive = false;
      assistantState.completionReason = completion.reason;
      assistantState.streamEndedBy = completion.endBy;
      assistantState.finishReasonRaw = completion.finishReasonRaw || '';
      assistantState.completionAt = formatCompletionTime(completion.timestamp);
      assistantState.completionTimestamp = completion.timestamp || 0;
      assistantState.timestampFull = formatTimestampFull(completion.timestamp);
      assistantState.completionDurationMs = completion.durationMs || 0;
      assistantState.thinkDurationMs = completion.thinkDurationMs || 0;
      assistantState.genDurationMs = completion.genDurationMs || 0;
      assistantState.completionState = completion.completionState || 'Idle';
      assistantState.showRegenerate = true;
      updateStreamView();
      chat.messages.push({
        role: 'assistant',
        content: cleanAssistantContent(accumulated),
        thinking: accumulatedThinking,
        thinkingOpen: false,
        thinkingLabel: 'Thinking',
        hasThinking: !!accumulatedThinking,
        completionReason: completion.reason,
        streamEndedBy: completion.endBy,
        finishReasonRaw: completion.finishReasonRaw || '',
        completionAt: formatCompletionTime(completion.timestamp),
        completionTimestamp: completion.timestamp || 0,
        timestampFull: formatTimestampFull(completion.timestamp),
        completionModel: model,
        completionDurationMs: completion.durationMs || 0,
        thinkDurationMs: completion.thinkDurationMs || 0,
        genDurationMs: completion.genDurationMs || 0,
        completionState: completion.completionState || 'Idle',
        activityThinkingOpen: false,
        showRegenerate: true
      });
      setStatus(`Ready (${completion.reason})`, 'idle');
      handleAssistantVoiceReply(cleanAssistantContent(accumulated));
    } catch (error) {
      if (error?.name === 'AbortError') {
        if (placeholder && (placeholder.textContent || placeholder.closest('.bubble')?.querySelector('.thinking-content')?.textContent)) {
          setStatus('Ready', 'idle');
        } else {
          setStatus('Stopped', 'idle');
        }
      } else {
        setStatus('Error', 'error');
        showError(String(error?.message || error));
      }
      const placeholderState = placeholderWrap?.__assistantState || placeholderWrap?.querySelector('.msg')?.__assistantState;
      if (placeholderWrap && !(placeholderState?.content || placeholderState?.thinking)) placeholderWrap.remove();
    } finally {
      controller = null;
      streamReader = null;
      setBusy(false);
      maybeScroll(true);
      saveAll();
    }
  }

  async function stopStreaming() {
    const activeController = controller;
    controller = null;
    try {
      if (activeController) activeController.abort();
      if (streamReader) await streamReader.cancel().catch(() => {});
    } finally {
      setStatus('Stopped', 'idle');
    }
  }

  function voiceLangValue() {
    return ($('voiceLang')?.value || navigator.language || 'en-US').trim() || 'en-US';
  }

  function hasPromptPayload() {
    return !!((promptEl.value || '').trim() || pendingAttachments.length);
  }

  function isMicStreamLive() {
    return !!(micStream && micStream.getAudioTracks().some(track => track.readyState === 'live'));
  }

  function isVoiceActive() {
    return voiceModeEnabled || recognitionMode !== 'idle' || !!speakingUtterance;
  }

  function setPrimaryAction(kind) {
    sendBtn.dataset.action = kind;
    sendBtn.classList.toggle('is-stop', kind === 'stop');
    sendBtn.classList.toggle('is-talk', kind === 'talk');
    sendBtn.classList.toggle('active', kind === 'talk' && voiceModeEnabled);
    sendBtn.classList.toggle('listening', kind === 'talk' && recognitionMode === 'talk');

    if (kind === 'stop') {
      sendBtn.innerHTML = ICON_STOP;
      sendBtn.disabled = false;
      sendBtn.setAttribute('aria-label', controller ? 'Stop generating' : 'Stop voice');
      sendBtn.setAttribute('title', controller ? 'Stop generating' : 'Stop voice');
      return;
    }

    if (kind === 'talk') {
      sendBtn.innerHTML = ICON_TALK;
      sendBtn.disabled = !speechRecognitionSupported;
      sendBtn.setAttribute('aria-label', speechRecognitionSupported ? 'Talk mode' : 'Speech recognition unsupported');
      sendBtn.setAttribute('title', speechRecognitionSupported ? 'Talk mode' : 'Speech recognition is not supported in this browser');
      return;
    }

    sendBtn.innerHTML = ICON_SEND;
    sendBtn.disabled = false;
    sendBtn.setAttribute('aria-label', 'Send');
    sendBtn.setAttribute('title', 'Send');
  }

  function updatePrimaryAction() {
    if (controller || isVoiceActive()) {
      setPrimaryAction('stop');
      return;
    }

    if (hasPromptPayload()) setPrimaryAction('send');
    else setPrimaryAction('talk');
  }

  function updateVoiceButtons() {
    if (!micBtn) return;

    micBtn.classList.toggle('active', recognitionMode === 'dictation');
    micBtn.classList.toggle('listening', recognitionMode === 'dictation');
    micBtn.setAttribute('aria-pressed', recognitionMode === 'dictation' ? 'true' : 'false');

    if (!speechRecognitionSupported) {
      micBtn.disabled = true;
      micBtn.title = 'Speech recognition is not supported in this browser';
      updatePrimaryAction();
      return;
    }

    micBtn.disabled = !!controller || voiceModeEnabled || recognitionMode === 'talk';
    micBtn.title = recognitionMode === 'dictation' ? 'Stop dictation' : 'Dictate';
    updatePrimaryAction();
  }

  function stopVoiceRestartTimer() {
    if (voiceRestartTimer) {
      clearTimeout(voiceRestartTimer);
      voiceRestartTimer = null;
    }
  }

  function stopSpeechOutput() {
    if (!speechSynthesisSupported) return;
    try { window.speechSynthesis.cancel(); } catch {}
    speakingUtterance = null;
  }

  function showVoiceMeter(show) {
    if (!voiceMeter) return;
    voiceMeter.hidden = !show;
    voiceMeter.classList.toggle('active', !!show);
    voiceMeter.classList.toggle('silent', true);
    if (!show) {
      for (const bar of voiceMeter.querySelectorAll('.voice-meter-bar')) {
        bar.style.height = '8px';
      }
    }
  }

  async function ensureMicStream() {
    if (!mediaDevicesSupported) return null;
    if (isMicStreamLive()) return micStream;
    if (micRequestPromise) return micRequestPromise;

    micRequestPromise = navigator.mediaDevices.getUserMedia({
      audio: {
        echoCancellation: true,
        noiseSuppression: true,
        autoGainControl: true
      },
      video: false
    }).then(stream => {
      micStream = stream;
      return stream;
    }).finally(() => {
      micRequestPromise = null;
    });

    return micRequestPromise;
  }

  function ensureAudioGraph(stream) {
    const AudioContextCtor = window.AudioContext || window.webkitAudioContext;
    if (!AudioContextCtor || !stream) return null;

    if (!audioContext || audioContext.state === 'closed') {
      audioContext = new AudioContextCtor();
      const source = audioContext.createMediaStreamSource(stream);
      analyserNode = audioContext.createAnalyser();
      analyserNode.fftSize = 1024;
      analyserNode.smoothingTimeConstant = 0.72;
      source.connect(analyserNode);
    }

    if (audioContext.state === 'suspended') {
      audioContext.resume().catch(() => {});
    }

    return analyserNode;
  }

  function updateMeterLevel(level) {
    if (!voiceMeter) return;
    const bars = Array.from(voiceMeter.querySelectorAll('.voice-meter-bar'));
    const now = performance.now();
    const sound = level > 0.026;

    voiceMeter.classList.toggle('silent', !sound);
    const shaped = Math.min(1, Math.max(0, level * 9.5));
    bars.forEach((bar, index) => {
      const phase = Math.sin((now / 120) + index * 0.82) * 0.5 + 0.5;
      const height = 8 + Math.round((8 + phase * 26) * Math.max(0.08, shaped));
      bar.style.height = `${Math.min(38, height)}px`;
    });
  }

  function startMeter() {
    const analyser = ensureAudioGraph(micStream);
    showVoiceMeter(true);
    if (!analyser) return;

    if (meterFrame) cancelAnimationFrame(meterFrame);

    const data = new Uint8Array(analyser.fftSize);
    const tick = () => {
      if (recognitionMode === 'idle') return;

      analyser.getByteTimeDomainData(data);
      let sum = 0;
      for (const value of data) {
        const centered = (value - 128) / 128;
        sum += centered * centered;
      }

      const rms = Math.sqrt(sum / data.length);
      updateMeterLevel(rms);

      const now = performance.now();
      const elapsed = now - voiceStartedAt;
      const capturedText = `${finalTranscript} ${interimTranscript}`.trim();

      /*
        Important:
        Dictate and Talk both use SpeechRecognition. The meter is only a visual
        meter and a post-text silence finisher. It must not decide "no audio"
        before SpeechRecognition has had a fair chance to emit text.

        The previous build killed Talk after ~6.5s with "No audio detected."
        even though Dictate worked. Chrome can delay Talk results until it has
        enough speech/silence context, so this gate must wait for recognition.
      */

      if (capturedText && lastVoiceTextAt && now - lastVoiceTextAt > 1350) {
        stopSpeechInput();
        return;
      }

      if (!capturedText && elapsed > 30000) {
        voiceNoSpeech = true;
        showError('No audio detected.');
        stopSpeechInput();
        return;
      }

      if (elapsed > 60000) {
        stopSpeechInput();
        return;
      }

      meterFrame = requestAnimationFrame(tick);
    };

    meterFrame = requestAnimationFrame(tick);
  }

  function stopMeter() {
    if (meterFrame) {
      cancelAnimationFrame(meterFrame);
      meterFrame = 0;
    }
    showVoiceMeter(false);
  }

  function stopSpeechInput() {
    stopVoiceRestartTimer();
    voiceStopRequested = true;

    if (!recognition) {
      recognitionMode = 'idle';
      stopMeter();
      updateVoiceButtons();
      return;
    }

    try { recognition.stop(); } catch {}
  }

  function createSpeechRecognition(mode) {
    const recog = new SpeechRecognitionCtor();
    recog.continuous = false;
    recog.interimResults = true;
    recog.maxAlternatives = 1;
    recog.lang = voiceLangValue();

    recog.onstart = () => {
      voiceStartedAt = performance.now();
      lastVoiceTextAt = 0;
      voiceNoSpeech = false;
      voiceStopRequested = false;
      setStatus(mode === 'talk' ? 'Listening' : 'Dictating', 'busy');
      startMeter();
      updateVoiceButtons();
    };

    recog.onresult = event => {
      let interim = '';
      let freshFinal = '';

      for (let i = event.resultIndex; i < event.results.length; ++i) {
        const result = event.results[i];
        const part = result?.[0]?.transcript || '';
        if (result.isFinal) freshFinal += part;
        else interim += part;
      }

      if (freshFinal) finalTranscript = joinSpeech(finalTranscript, freshFinal);
      interimTranscript = interim;

      const spoken = joinSpeech(finalTranscript, interimTranscript);
      if (spoken.trim()) {
        lastVoiceTextAt = performance.now();
        const combined = mode === 'dictation'
          ? joinSpeech(speechBaseText, spoken)
          : spoken;
        promptEl.value = combined.trimStart();
        showError('');
        setStatus(mode === 'talk' ? 'Heard speech' : 'Dictating', 'busy');
        autoresize();
        updatePrimaryAction();
      }
    };

    recog.onerror = event => {
      const error = event?.error || 'unknown';
      if (error === 'no-speech') {
        voiceNoSpeech = true;
        showError('No audio detected.');
        return;
      }

      if (error === 'aborted' && voiceStopRequested) return;

      if (error === 'not-allowed' || error === 'service-not-allowed') {
        voiceModeEnabled = false;
        voiceNoSpeech = true;
        showError('Microphone permission is blocked. Enable microphone access for this site and reload.');
        setStatus('Mic blocked', 'error');
        return;
      }

      showError(`Speech recognition error: ${error}`);
      setStatus('Error', 'error');
    };

    recog.onend = () => {
      const endedMode = recognitionMode;
      const capturedText = `${finalTranscript} ${interimTranscript}`.trim();
      const promptText = (promptEl.value || '').trim();
      const hasUsableText = !!(capturedText || promptText);

      recognition = null;
      recognitionMode = 'idle';
      stopMeter();

      if (!hasUsableText || voiceNoSpeech) {
        if (endedMode === 'talk') voiceModeEnabled = false;
        if (!controller) setStatus('No audio detected.', 'idle');
        showError('No audio detected.');
        updateVoiceButtons();
        return;
      }

      showError('');
      updateVoiceButtons();

      if (endedMode === 'talk') {
        if (voiceModeEnabled && promptText && !controller) {
          sendMessage({ regenerate: false });
          return;
        }
        if (voiceModeEnabled && !controller && !speakingUtterance) scheduleVoiceListen();
        else if (!controller) setStatus('Ready', 'idle');
        return;
      }

      if (!controller) setStatus('Ready', 'idle');
    };

    return recog;
  }

  function joinSpeech(left, right) {
    const a = String(left || '').trim();
    const b = String(right || '').trim();

    if (!a) return b;
    if (!b) return a;

    return `${a}${/\s$/.test(left) ? '' : ' '}${b}`;
  }

  async function startSpeechInput(mode) {
    showError('');
    stopVoiceRestartTimer();

    if (!speechRecognitionSupported) {
      showError('Speech recognition is not supported in this browser. Use Chrome or Edge.');
      voiceModeEnabled = false;
      updateVoiceButtons();
      return;
    }

    if (recognitionMode !== 'idle') {
      stopSpeechInput();
      return;
    }

    try {
      await ensureMicStream();

      recognitionMode = mode;
      speechBaseText = mode === 'dictation' ? (promptEl.value || '') : '';
      finalTranscript = '';
      interimTranscript = '';
      voiceNoSpeech = false;
      voiceStopRequested = false;
      voiceStartedAt = performance.now();
      lastVoiceTextAt = 0;

      if (mode === 'talk') {
        promptEl.value = '';
        autoresize();
      }

      recognition = createSpeechRecognition(mode);
      setStatus(mode === 'talk' ? 'Listening' : 'Dictating', 'busy');
      updateVoiceButtons();
      recognition.start();
    } catch (error) {
      recognition = null;
      recognitionMode = 'idle';
      voiceModeEnabled = false;
      stopMeter();

      const name = error?.name || '';
      if (name === 'NotAllowedError' || name === 'SecurityError') {
        showError('Microphone permission is blocked. Enable microphone access for this site and reload.');
        setStatus('Mic blocked', 'error');
      } else {
        showError(String(error?.message || error));
        setStatus('Error', 'error');
      }

      updateVoiceButtons();
    }
  }

  function scheduleVoiceListen() {
    stopVoiceRestartTimer();
    if (!voiceModeEnabled || controller || speakingUtterance) return;
    voiceRestartTimer = setTimeout(() => {
      voiceRestartTimer = null;
      if (voiceModeEnabled && !controller && !speakingUtterance && recognitionMode === 'idle') {
        startSpeechInput('talk');
      }
    }, 600);
  }

  function toggleDictation() {
    showError('');
    if (recognitionMode === 'dictation') {
      stopSpeechInput();
      return;
    }
    if (voiceModeEnabled) toggleTalkMode(false);
    startSpeechInput('dictation');
  }

  function toggleTalkMode(force) {
    showError('');
    const next = typeof force === 'boolean' ? force : !voiceModeEnabled;
    voiceModeEnabled = next;
    stopVoiceRestartTimer();

    if (!next) {
      stopSpeechInput();
      stopSpeechOutput();
      recognitionMode = 'idle';
      setStatus('Ready', 'idle');
      updateVoiceButtons();
      return;
    }

    if (!speechRecognitionSupported) {
      voiceModeEnabled = false;
      showError('Speech recognition is not supported in this browser. Use Chrome or Edge.');
      updateVoiceButtons();
      return;
    }

    stopSpeechOutput();
    startSpeechInput('talk');
  }

  function speechSafeText(text) {
    return String(text || '')
      .replace(/```[\s\S]*?```/g, ' code block omitted ')
      .replace(/<think>[\s\S]*?<\/think>/gi, ' ')
      .replace(/[\r\n]+/g, ' ')
      .replace(/\s+/g, ' ')
      .trim();
  }

  function handleAssistantVoiceReply(text) {
    const shouldSpeak = voiceModeEnabled || !!$('speakReplies')?.checked;
    const safeText = speechSafeText(text);
    if (!safeText) {
      if (voiceModeEnabled) scheduleVoiceListen();
      return;
    }

    if (!shouldSpeak || !speechSynthesisSupported) {
      if (voiceModeEnabled) scheduleVoiceListen();
      return;
    }

    stopSpeechOutput();
    const utterance = new SpeechSynthesisUtterance(safeText);
    utterance.lang = voiceLangValue();
    utterance.rate = 1;
    utterance.pitch = 1;
    utterance.onstart = () => {
      speakingUtterance = utterance;
      setStatus('Speaking', 'busy');
      updateVoiceButtons();
    };
    utterance.onend = () => {
      if (speakingUtterance === utterance) speakingUtterance = null;
      if (voiceModeEnabled) scheduleVoiceListen();
      else setStatus('Ready', 'idle');
      updateVoiceButtons();
    };
    utterance.onerror = () => {
      if (speakingUtterance === utterance) speakingUtterance = null;
      if (voiceModeEnabled) scheduleVoiceListen();
      else setStatus('Ready', 'idle');
      updateVoiceButtons();
    };
    window.speechSynthesis.speak(utterance);
  }

  function autoresize() {
    const style = getComputedStyle(promptEl);
    const lineHeight = parseFloat(style.lineHeight) || 24;
    const maxRows = 5;
    const maxHeight = lineHeight * maxRows;
    const composerRow = promptEl.closest('.row');
    const hasSecondLine = promptEl.value.includes('\n');

    if (composerRow) composerRow.classList.toggle('multiline', hasSecondLine);

    promptEl.style.height = 'auto';
    const scrollHeight = promptEl.scrollHeight;

    if (!hasSecondLine) {
      promptEl.style.height = `${lineHeight}px`;
      promptEl.style.overflowY = 'hidden';
      return;
    }

    const finalHeight = Math.max(lineHeight, Math.min(scrollHeight, maxHeight));
    promptEl.style.height = `${finalHeight}px`;
    promptEl.style.overflowY = scrollHeight > maxHeight ? 'auto' : 'hidden';
  }

  // Events
  toggleDrawerBtn.addEventListener('click', () => {
    if (window.innerWidth <= LOCK_CHAT_DRAWER_WIDTH && !drawer.classList.contains('open')) return;
    drawer.classList.toggle('open');
    applyResponsiveShell();
  });
  toggleThinkingDrawerBtn.addEventListener('click', () => {
    if (thinkingDrawer.classList.contains('open')) closeThinkingDrawer();
    else openThinkingDrawer(activeThinkingState);
  });
  closeThinkingDrawerBtn?.addEventListener('click', event => {
    event.preventDefault();
    event.stopPropagation();
    closeThinkingDrawer();
  });
  newChatBtn.addEventListener('click', newChat);
  window.addEventListener('resize', applyResponsiveShell);
  document.addEventListener('click', event => {
    if (ctxMenu.style.display === 'block' && !ctxMenu.contains(event.target)) ctxMenu.style.display = 'none';
    const clickedChatControl = event.target.closest('#toggleDrawer');
    const clickedActivityControl = event.target.closest('#toggleThinkingDrawer')
      || event.target.closest('.thinking-wrap')
      || event.target.closest('.activity-launch');
    if (thinkingDrawer.classList.contains('open')
        && !thinkingDrawer.contains(event.target)
        && !clickedActivityControl
        && !clickedChatControl) {
      closeThinkingDrawer();
    }
    if (drawer.classList.contains('open')
        && !drawer.contains(event.target)
        && !clickedChatControl
        && !clickedActivityControl) {
      drawer.classList.remove('open');
      syncShellLayout();
    }
  });
  ctxMenu.addEventListener('click', () => {
    const id = Number(ctxMenu.dataset.id || 0);
    if (id) deleteChat(id);
    ctxMenu.style.display = 'none';
  });

  $('probe').addEventListener('click', () => probeModels(false));
  $('autofill').addEventListener('click', () => probeModels(true));

  $('clear').addEventListener('click', () => {
    const chat = currentChat();
    if (!chat) return;
    chat.messages = [];
    renderActiveChat();
    refreshLastUserFromChat();
    saveAll();
    setStatus('Cleared', 'idle');
  });

  $('copyAll').addEventListener('click', () => {
    const chat = currentChat();
    if (!chat) return;
    const all = chat.messages.map(msg => {
      if (Array.isArray(msg.attachments) && msg.attachments.length) return `${msg.role.toUpperCase()} [attachments]: ${msg.content || ''}`;
      return `${msg.role.toUpperCase()}: ${msg.content || ''}`;
    }).join('\n\n');
    navigator.clipboard.writeText(all);
  });

  sendBtn.addEventListener('click', () => {
    const action = sendBtn.dataset.action || 'send';
    if (action === 'stop') {
      if (controller) stopStreaming();
      else if (recognitionMode !== 'idle') stopSpeechInput();
      else toggleTalkMode(false);
      return;
    }
    if (action === 'talk') {
      toggleTalkMode(true);
      return;
    }
    sendMessage({ regenerate: false });
  });
  stopBtn.addEventListener('click', stopStreaming);
  micBtn?.addEventListener('click', toggleDictation);

  promptEl.addEventListener('input', () => {
    autoresize();
    updatePrimaryAction();
  });
  promptEl.addEventListener('keydown', event => {
    if (event.key === 'Enter' && !event.shiftKey) {
      event.preventDefault();
      sendMessage({ regenerate: false });
    } else if (event.key === 'ArrowUp' && !promptEl.value) {
      event.preventDefault();
      promptEl.value = lastUser || '';
      autoresize();
      updatePrimaryAction();
    }
  });


  function renderPendingAttachments() {
    if (!pendingAttachments.length) {
      imgPreview.innerHTML = '';
      imgPreview.hidden = true;
      updatePrimaryAction();
      return;
    }
    imgPreview.hidden = false;
    imgPreview.innerHTML = '';
    pendingAttachments.forEach((att, index) => {
      const chip = document.createElement('div');
      chip.className = 'file-chip';
      if (att.kind === 'image' && att.preview) {
        const img = document.createElement('img');
        img.src = att.preview;
        img.alt = att.name || 'image';
        chip.appendChild(img);
      }
      const label = document.createElement('span');
      label.textContent = att.name || (att.kind === 'image' ? 'Image' : 'Text file');
      const remove = document.createElement('button');
      remove.type = 'button';
      remove.textContent = '×';
      remove.addEventListener('click', () => {
        pendingAttachments.splice(index, 1);
        renderPendingAttachments();
      });
      chip.append(label, remove);
      imgPreview.appendChild(chip);
    });
    updatePrimaryAction();
  }

  async function fileToAttachment(file) {
    if (file.type.startsWith('image/')) {
      const data = await new Promise(resolve => {
        const reader = new FileReader();
        reader.onload = event => resolve(String(event.target?.result || ''));
        reader.readAsDataURL(file);
      });
      return { kind: 'image', name: file.name, mime: file.type, data, preview: data };
    }
    const text = await file.text();
    return { kind: 'text', name: file.name, mime: file.type || 'text/plain', text };
  }

  attachBtn.addEventListener('click', () => imgInput.click());
  imgInput.addEventListener('change', async () => {
    const files = Array.from(imgInput.files || []);
    if (!files.length) return;
    for (const file of files) {
      const attachment = await fileToAttachment(file);
      if (attachment.kind === 'image') pendingAttachments.push(attachment);
      else pendingAttachments.push(attachment);
    }
    renderPendingAttachments();
    imgInput.value = '';
  });

  if (settingsDialog && typeof settingsDialog.showModal !== 'function') settingsDialog.classList.add('fallback');
  $('settingsBtn').addEventListener('click', () => {
    if (typeof settingsDialog.showModal === 'function') {
      if (!settingsDialog.open) settingsDialog.showModal();
    } else {
      settingsDialog.classList.toggle('open');
    }
  });
  $('closeSettings').addEventListener('click', () => {
    if (settingsDialog.open) settingsDialog.close();
    else settingsDialog.classList.remove('open');
  });
  settingsDialog?.addEventListener('click', event => {
    if (event.target === settingsDialog && settingsDialog.open) settingsDialog.close();
  });

  ['endpoint', 'model', 'apiKey', 'system', 'temperature', 'max_tokens', 'stream', 'voiceLang', 'speakReplies'].forEach(id => {
    const el = $(id);
    if (!el) return;
    el.addEventListener('change', saveAll);
    el.addEventListener('input', saveAll);
  });

  window.addEventListener('beforeunload', () => {
    try { stopSpeechInput(); } catch {}
    if (micStream) {
      for (const track of micStream.getTracks()) {
        try { track.stop(); } catch {}
      }
    }
    if (audioContext && audioContext.state !== 'closed') {
      try { audioContext.close(); } catch {}
    }
  });

  loadAll();
  refreshLastUserFromChat();
  autoresize();
  syncThinkingDrawer();
  applyResponsiveShell();
  setBusy(false);
  updateVoiceButtons();
  setStatus(currentChat()?.messages.length ? 'Ready' : 'Idle', 'idle');
